name: iOS TestFlight

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_and_upload:
    runs-on: macos-14

    env:
      # Match / signing
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_URL: git@github.com:BootlegCash/after-hours-ios-signing.git

      # App Store Connect API key (preferred over Apple ID password)
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}

      # Your iOS bundle identifier + team id
      APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ FIX: use channel, not flutter-version: stable
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios

      # (Optional but usually needed for Flutter iOS builds)
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod --version

      # --- SSH for match repo (certs/profiles repo) ---
      - name: Set up SSH for match repo
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MATCH_GIT_PRIVATE_KEY }}" > ~/.ssh/match_ci
          chmod 600 ~/.ssh/match_ci

          cat >> ~/.ssh/config <<'EOF'
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/match_ci
            IdentitiesOnly yes
            StrictHostKeyChecking no
          EOF

          ssh -T git@github.com || true

      # --- App Store Connect API key (.p8) ---
      # Store your .p8 content as BASE64 in ASC_KEY_P8_BASE64
      - name: Create App Store Connect API key file
        working-directory: ios
        run: |
          mkdir -p fastlane
          echo "${{ secrets.ASC_KEY_P8_BASE64 }}" | base64 --decode > fastlane/AuthKey_${{ env.ASC_KEY_ID }}.p8
          ls -la fastlane

      # --- Install iOS dependencies (pods) ---
      - name: Pod install
        working-directory: ios
        run: |
          bundle exec pod repo update
          bundle exec pod install --repo-update

      # --- Fastlane: install signing (match) ---
      - name: Match (App Store)
        working-directory: ios
        run: |
          bundle exec fastlane match appstore \
            --readonly \
            --git_url "${MATCH_GIT_URL}" \
            --app_identifier "${APP_IDENTIFIER}" \
            --team_id "${APPLE_TEAM_ID}"

      # --- Build IPA with Flutter (uses Xcode under the hood) ---
      - name: Build IPA
        run: |
          flutter build ipa --release

      # --- Upload to TestFlight using Fastlane pilot with API key ---
      - name: Upload to TestFlight
        working-directory: ios
        run: |
          bundle exec fastlane run pilot \
            api_key_path:"fastlane/AuthKey_${ASC_KEY_ID}.p8" \
            issuer_id:"${ASC_ISSUER_ID}" \
            ipa:"../build/ios/ipa/*.ipa"
